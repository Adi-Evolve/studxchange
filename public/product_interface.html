<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Interface - StudXchange</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" />
  <script src="js/db-config.js"></script>
  <style>
    :root {
      --primary-color: #2a3d56;
      --secondary-color: #2a3d56;
      --accent-color: #1a75ff;
      --text-color: #333;
      --bg-color: #f4f6f9;
      --white-color: #fff;
      --shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: var(--primary-color);
      color: var(--white-color);
      padding: 1rem;
      text-align: center;
      box-shadow: var(--shadow);
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .product-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      background: var(--white-color);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    .product-images {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .main-image-container {
      width: 100%;
      height: 400px;
      border-radius: 12px;
      overflow: hidden;
      background-color: #eaeaea;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnails {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding: 0.5rem 0;
    }

    .thumbnail {
      flex: 0 0 auto;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .thumbnail:hover {
      transform: scale(1.05);
      opacity: 0.8;
    }

    .product-details {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .product-header {
      border-bottom: 1px solid #ddd;
      padding-bottom: 1rem;
    }

    .product-title {
      font-size: 2rem;
      color: var(--secondary-color);
      margin-bottom: 0.5rem;
    }

    .price-section {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .current-price {
      font-size: 1.75rem;
      color: var(--accent-color);
      font-weight: bold;
    }

    .original-price {
      color: #777;
      text-decoration: line-through;
      font-size: 1rem;
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      margin: 1rem 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background-color: var(--accent-color);
      color: var(--white-color);
    }

    .btn-secondary {
      background-color: var(--secondary-color);
      color: var(--white-color);
    }

    .btn:hover {
      transform: scale(1.02);
    }

    .product-description {
      margin: 2rem 0;
      line-height: 1.6;
    }

    .product-description p {
      line-height: 1.6;
      font-size: 1rem;
    }

    footer {
      background-color: var(--primary-color);
      color: var(--white-color);
      text-align: center;
      padding: 1.5rem;
      margin-top: auto;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--white-color);
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      position: relative;
      box-shadow: var(--shadow);
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      cursor: pointer;
      font-size: 1.5rem;
    }

    .buyer-info {
      display: grid;
      gap: 1rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      .product-container {
        grid-template-columns: 1fr;
      }
      .main-image-container {
        height: 300px;
      }
      
      .room-layout {
        display: flex;
        flex-direction: column;
      }
      
      .room-images {
        order: 1;
      }
      
      .room-info {
        order: 2;
      }
      
      .room-description {
        order: 3;
      }
    }

    /* Seller Info Styles */
    #sellerInfoContent ul {
      list-style: none;
      padding: 0;
    }

    #sellerInfoContent li {
      margin: 0.5rem 0;
      padding: 0.5rem;
      background: #f8f9fa;

  <header>
    <div class="navbar">
      <div class="navlogo">
        <a href="index.html">

        </a>
      </div>
      <div class="search-container">
        <form class="searchbar" action="search-results.html" method="GET">

            <option value="all">All</option>
            <option value="VIT">VIT</option>
            <option value="COEP">COEP</option>
            <option value="PICT">PICT</option>

          <button type="submit"><i class="fas fa-search"></i></button>
        </form>
      </div>
      <div class="button-container">
        <a class="wishlist-button" href="wishlist.html"><i class="fa-regular fa-heart"></i></a>
        <a class="profile-button" href="PROFILE_FINAL.html"><i class="fas fa-user"></i></a>
      </div>
    </div>
  </header>
  <main>
    <div class="product-container" id="productContainer">
      <div class="room-layout">
        <div class="product-images room-images">
          <div class="main-image-container">
            <img class="main-image" id="mainImage" alt="Main product image" />
          </div>
          <div class="thumbnails" id="thumbnails"></div>
        </div>

        <div class="product-header room-info">
          <div style="display: flex; justify-content: space-between; align-items: center">
            <h1 class="product-title" id="productTitle"></h1>
            <i class="far fa-heart wishlist-toggle" 
               onclick="toggleWishlist(currentProduct)" 
               style="font-size: 1.5rem; cursor: pointer;"></i>
          </div>
          <div class="price-section">
            <span class="current-price" id="productPrice"></span>
            <span class="original-price" id="productMRP"></span>
          </div>
          
          <!-- Room details section (will be shown only for rooms) -->
          <div id="roomDetailsSection" style="display: none;">
            <div class="room-details" id="roomDetails">
              <!-- Room details will be dynamically populated -->
            </div>
            <div class="amenities-list" id="amenitiesList">
              <!-- Amenities will be dynamically populated -->
            </div>
          </div>
          
          <div class="action-buttons" id="actionButtons">
            <!-- Buttons will be dynamically populated based on product type -->
          </div>
        </div>
        
        <div class="product-description room-description">
          <h3>Description</h3>
          <p id="productDescription"></p>
        </div>
        
        <!-- Similar Products Section -->
        <div id="similarProductsSection" class="similar-products-section">
          <h3>Similar Products</h3>
          <div id="similarProductsList" class="similar-products-list"></div>
        </div>
        
        <div id="reviewSection" style="display: none; margin-top: 2rem;">
          <h3>Reviews</h3>
          <div id="reviewsList" class="reviews-list"></div>
          <div class="add-review" style="margin-top: 1rem;">
            <h4>Add Review</h4>
            <div class="rating-input" style="margin-bottom: 1rem;">
              <span>Rating: </span>
              <div class="star-rating-selector" id="ratingStars">
                <i class="far fa-star" data-rating="1"></i>
                <i class="far fa-star" data-rating="2"></i>
                <i class="far fa-star" data-rating="3"></i>
                <i class="far fa-star" data-rating="4"></i>
                <i class="far fa-star" data-rating="5"></i>
              </div>
              <input type="hidden" id="ratingInput" value="5">
            </div>
            <textarea id="reviewText" placeholder="Write your review..." style="width: 100%; min-height: 100px; margin-bottom: 1rem;"></textarea>
            <button class="btn btn-primary" onclick="submitReview()">Submit Review</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Buy Now Modal -->
    <div id="buyModal" class="modal">
      <div class="modal-content">
        <span class="modal-close" onclick="closeBuyModal()">&times;</span>
        <h2>Complete Purchase</h2>
        <div class="buyer-info">
          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="buyerName" readonly />
          </div>
          <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="buyerEmail" readonly />
          </div>
          <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="buyerPhone" readonly />
          </div>
          <button class="btn btn-primary" onclick="initiatePurchase()">
            <i class="fab fa-whatsapp"></i> Confirm via WhatsApp
          </button>
        </div>
      </div>
    </div>

<div id="compareModal" class="modal">

  <script>
    // Constants
    const JSONBIN_BIN_ID = '6602e1f8266cfc3fde9d1f9e';
    const JSONBIN_API_KEY = '$2a$10$0Ow7aOKYGXxZEQz1Zj8cUeEMF.2aMtfUGlQIlxRjHLNRbCGTVPBqS';
    
    // Global variables
    let currentProduct = null;
    let wishlistItems = JSON.parse(localStorage.getItem('wishlist')) || [];
    let selectedProducts = [];
    let allProducts = [];
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      loadProductDetails();
      updateWishlistIcon();
    });

    // Update wishlist icon based on current product
    function updateWishlistIcon() {
      const wishlistIcon = document.getElementById('wishlistIcon');
      if (!wishlistIcon || !currentProduct) return;
      
      const isInWishlist = wishlistItems.some(item => item.title === currentProduct.title);
      wishlistIcon.classList.toggle('active', isInWishlist);
    }

    // Toggle product in wishlist
    function toggleWishlist(product) {
      if (!product) return;
      
      const isInWishlist = wishlistItems.some(item => item.title === product.title);
      
      if (isInWishlist) {
        wishlistItems = wishlistItems.filter(item => item.title !== product.title);
      } else {
        wishlistItems.push(product);
      }
      
      localStorage.setItem('wishlist', JSON.stringify(wishlistItems));
      updateWishlistIcon();
    }

    // Fetch all products for comparison
    async function fetchProducts() {
      const data = await fetchData();
      return data.products || [];
    }

    // Open comparison modal
    function openCompareModal() {
      document.getElementById('compareModal').style.display = 'flex';
      
      // Fetch and display products for comparison
      fetchProducts().then(products => {
        allProducts = products;
        filterProducts();
      });
    }

    // Close comparison modal
    function closeCompareModal() {
      document.getElementById('compareModal').style.display = 'none';
      selectedProducts = [];
    }

    // Filter products in comparison modal
    function filterProducts() {
      const searchTerm = document.getElementById('searchBar').value.toLowerCase();
      const productList = document.getElementById('productList');
      productList.innerHTML = '';
      
      allProducts.forEach(product => {
        if (product.title.toLowerCase().includes(searchTerm)) {
          const item = document.createElement('div');
          item.className = 'product-item';
          item.innerHTML = `
            <img src="${product.images[0]}" alt="${product.title}">
            <span>${product.title}</span>
            <button onclick="selectProduct(${JSON.stringify(product).replace(/"/g, '&quot;')})">Select</button>
          `;
          productList.appendChild(item);
        }
      });
    }

    // Select product for comparison
    function selectProduct(product) {
      if (selectedProducts.length < 2) {
        selectedProducts.push(product);
      }
      
      if (selectedProducts.length === 2) {
        compareProducts();
      }
    }

    // Compare selected products
    function compareProducts() {
      if (selectedProducts.length !== 2) return;
      
      displayComparisonTable(selectedProducts[0], selectedProducts[1]);
    }

    // Display comparison table
    function displayComparisonTable(product1, product2) {
      const table = document.getElementById('comparisonTable');
      table.innerHTML = `
        <table>
          <tr><th>Feature</th><th>${product1.title}</th><th>${product2.title}</th></tr>
          <tr><td>Price</td><td>₹${product1.price}</td><td>₹${product2.price}</td></tr>
          <tr><td>Condition</td><td>${product1.condition}</td><td>${product2.condition}</td></tr>
          <tr><td>Category</td><td>${product1.category}</td><td>${product2.category}</td></tr>
        </table>
      `;
      table.style.display = 'block';
    }

    // Fetch data from MongoDB directly
    async function fetchProductByTitle(title) {
      try {
        console.log(`Fetching product with title: ${title}`);
        const encodedTitle = encodeURIComponent(title);
        const response = await fetch(`/api/products/title/${encodedTitle}`);
        
        if (!response.ok) {
          console.error(`Error fetching product: ${response.status} ${response.statusText}`);
          return null;
        }
        
        const product = await response.json();
        console.log("Product fetched successfully:", product);
        return product;
      } catch (error) {
        console.error("Error fetching product:", error);
        return null;
      }
    }

    // Fetch room data directly from MongoDB
    async function fetchRoomByTitle(title) {
      try {
        console.log(`Fetching room with title: ${title}`);
        const encodedTitle = encodeURIComponent(title);
        const response = await fetch(`/api/rooms/title/${encodedTitle}`);
        
        if (!response.ok) {
          console.error(`Error fetching room: ${response.status} ${response.statusText}`);
          return null;
        }
        
        const room = await response.json();
        console.log("Room fetched successfully:", room);
        // Add category to room object for consistency
        room.category = 'Room';
        return room;
      } catch (error) {
        console.error("Error fetching room:", error);
        return null;
      }
    }

    // Fetch all data from JSONBin (fallback)
    async function fetchData() {
      try {
        console.log("Fetching data from JSONBin...");
        const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
          headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        
        if (!response.ok) {
          console.error(`JSONBin fetch failed: ${response.status} ${response.statusText}`);
          return { products: [], users: [], soldItems: [], rooms: [] };
        }
        
        const data = await response.json();
        console.log("Raw data from JSONBin:", data);
        
        if (!data.record) {
          console.error("No record found in JSONBin response");
          return { products: [], users: [], soldItems: [], rooms: [] };
        }
        
        return data.record || { products: [], users: [], soldItems: [], rooms: [] };
      } catch (error) {
        console.error("Failed to load data from JSONBin:", error);
        return { products: [], users: [], soldItems: [], rooms: [] };
      }
    }

    // Main function to load product details
    async function loadProductDetails() {
      try {
        // Show loading indicator
        document.getElementById('loading').style.display = 'flex';
        
        // Get product title from URL
        const urlParams = new URLSearchParams(window.location.search);
        const rawParam = urlParams.get('product');
        
        if (!rawParam) {
          console.error("No product parameter provided in URL");
          displayError("No product specified. Please select a product from the home page.");
          return;
        }
        
        // Try different decoding methods to handle potential double encoding
        const productTitleParam = decodeURIComponent(rawParam);
        const doubleDecodedParam = decodeURIComponent(productTitleParam);
        
        console.log("Loading product/room with:");
        console.log("- Raw param:", rawParam);
        console.log("- Decoded once:", productTitleParam);
        console.log("- Decoded twice:", doubleDecodedParam);
        
        // Try all title variations
        const titleVariations = [
          productTitleParam,
          doubleDecodedParam,
          encodeURIComponent(productTitleParam)
        ];
        
        // First try to fetch product directly from MongoDB
        let item = null;
        
        // Try each title variation
        for (const title of titleVariations) {
          if (!title) continue;
          
          // Try to fetch product
          item = await fetchProductByTitle(title);
          if (item) {
            console.log("Found product in MongoDB:", item);
            break;
          }
          
          // If not found as product, try as room
          item = await fetchRoomByTitle(title);
          if (item) {
            console.log("Found room in MongoDB:", item);
            break;
          }
        }
        
        // If not found in MongoDB, try JSONBin as fallback
        if (!item) {
          console.log("Item not found in MongoDB, trying JSONBin...");
          const data = await fetchData();
          
          // Check in products collection
          if (data.products && Array.isArray(data.products)) {
            for (const title of titleVariations) {
              item = data.products.find(p => 
                p.title && (p.title === title || p.title.toLowerCase() === title.toLowerCase())
              );
              if (item) {
                console.log("Found in JSONBin products collection:", item);
                break;
              }
            }
          }
          
          // If not found in products, check in rooms collection
          if (!item && data.rooms && Array.isArray(data.rooms)) {
            for (const title of titleVariations) {
              item = data.rooms.find(r => 
                r.title && (r.title === title || r.title.toLowerCase() === title.toLowerCase())
              );
              if (item) {
                console.log("Found in JSONBin rooms collection:", item);
                item.category = 'Room';
                break;
              }
            }
          }
        }
        
        // Set current product
        currentProduct = item;
        
        // Handle case when product is not found
        if (!currentProduct) {
          console.error("Product not found in any source. Title variations tried:", titleVariations);
          displayError("Product not found. Please try another product or contact support.");
          return;
        }
        
        // Render product details
        renderProductDetails();
        
        // Load similar products
        loadSimilarProducts(currentProduct);
        
        // Hide loading indicator
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        console.error("Error loading product details:", error);
        displayError("An error occurred while loading the product. Please try again later.");
        document.getElementById('loading').style.display = 'none';
      }
    }

    // Display error message
    function displayError(message) {
      const container = document.getElementById('productContainer');
      container.innerHTML = `
        <div class="error-container">
          <div class="error-icon">⚠️</div>
          <h2>Error</h2>
          <p>${message}</p>
          <a href="index.html" class="btn btn-primary">Return to Home</a>
        </div>
      `;
      document.getElementById('loading').style.display = 'none';
    }

    // Render product details
    function renderProductDetails() {
      if (!currentProduct) return;
      
      const isRoom = currentProduct.category === 'Room';
      const container = document.getElementById('productContainer');
      
      // Determine if the container should show room layout
      if (isRoom) {
        container.classList.add('room-layout');
      } else {
        container.classList.remove('room-layout');
      }
      
      // Prepare images HTML
      let imagesHTML = '';
      let thumbnailsHTML = '';
      
      if (currentProduct.images && currentProduct.images.length > 0) {
        // Main image
        imagesHTML = `
          <div class="main-image-container">
            <img src="${currentProduct.images[0]}" alt="${currentProduct.title}" class="main-image" id="mainImage">
          </div>
        `;
        
        // Thumbnails
        thumbnailsHTML = `<div class="thumbnails">`;
        currentProduct.images.forEach((img, index) => {
          thumbnailsHTML += `
            <img src="${img}" alt="Thumbnail ${index + 1}" class="thumbnail" 
                 onclick="document.getElementById('mainImage').src='${img}'">
          `;
        });
        thumbnailsHTML += `</div>`;
      } else {
        // Placeholder if no images
        imagesHTML = `
          <div class="main-image-container">
            <div class="no-image">No Image Available</div>
          </div>
        `;
      }
      
      // Determine price display
      const priceHTML = currentProduct.originalPrice ? 
        `<div class="current-price">₹${currentProduct.price}</div>
         <div class="original-price">₹${currentProduct.originalPrice}</div>` :
        `<div class="current-price">₹${currentProduct.price}</div>`;
      
      // Room-specific or product-specific details
      let specificDetailsHTML = '';
      
      if (isRoom) {
        specificDetailsHTML = `
          <div class="room-details">
            <div class="room-info-section">
              <h3>Room Details</h3>
              <ul>
                <li><strong>Type:</strong> ${currentProduct.roomType || 'Not specified'}</li>
                <li><strong>Size:</strong> ${currentProduct.size || 'Not specified'}</li>
                <li><strong>Furnishing:</strong> ${currentProduct.furnishing || 'Not specified'}</li>
                <li><strong>Available From:</strong> ${currentProduct.availableFrom || 'Immediately'}</li>
              </ul>
            </div>
            
            <div class="room-amenities">
              <h3>Amenities</h3>
              <ul class="amenities-list">
                ${currentProduct.amenities ? currentProduct.amenities.map(amenity => 
                  `<li><i class="fas fa-check"></i> ${amenity}</li>`).join('') : 
                  '<li>No amenities listed</li>'}
              </ul>
            </div>
            
            <div class="room-rules">
              <h3>House Rules</h3>
              <ul class="rules-list">
                ${currentProduct.rules ? currentProduct.rules.map(rule => 
                  `<li><i class="fas fa-info-circle"></i> ${rule}</li>`).join('') : 
                  '<li>No specific rules listed</li>'}
              </ul>
            </div>
          </div>
        `;
      } else {
        specificDetailsHTML = `
          <div class="product-specs">
            <h3>Product Specifications</h3>
            <ul>
              <li><strong>Condition:</strong> ${currentProduct.condition || 'Not specified'}</li>
              <li><strong>Category:</strong> ${currentProduct.category || 'Not specified'}</li>
              <li><strong>Brand:</strong> ${currentProduct.brand || 'Not specified'}</li>
              ${currentProduct.age ? `<li><strong>Age:</strong> ${currentProduct.age}</li>` : ''}
              ${currentProduct.warranty ? `<li><strong>Warranty:</strong> ${currentProduct.warranty}</li>` : ''}
            </ul>
          </div>
        `;
      }
      
      // Build full HTML
      container.innerHTML = `
        <div class="product-images ${isRoom ? 'room-images' : ''}">
          ${imagesHTML}
          ${thumbnailsHTML}
        </div>
        
        <div class="product-details">
          <div class="product-header">
            <h1 class="product-title">${currentProduct.title}</h1>
            <div class="price-section">
              ${priceHTML}
            </div>
            <div class="location">
              <i class="fas fa-map-marker-alt"></i> ${currentProduct.location || 'Location not specified'}
            </div>
          </div>
          
          <div class="action-buttons">
            <button class="btn btn-primary" onclick="showSellerInfo()">
              <i class="fas fa-user"></i> Contact Seller
            </button>
            <button class="btn btn-secondary" id="wishlistButton" onclick="toggleWishlist(currentProduct)">
              <i class="fas fa-heart" id="wishlistIcon"></i> Add to Wishlist
            </button>
            <button class="btn compare-btn" onclick="openCompareModal()">
              <i class="fas fa-exchange-alt"></i> Compare
            </button>
          </div>
          
          <div class="product-description">
            <h3>Description</h3>
            <p>${currentProduct.description || 'No description provided.'}</p>
          </div>
          
          ${specificDetailsHTML}
        </div>
      `;
      
      // Update wishlist icon
      updateWishlistIcon();
    }

    // Load similar products
    async function loadSimilarProducts(data) {
      try {
        if (!data) return;
        
        const similarContainer = document.getElementById('similarProducts');
        if (!similarContainer) return;
        
        // Determine if we're dealing with a room or product
        const isRoom = data.category === 'Room';
        const category = isRoom ? 'Room' : (data.category || 'Other');
        
        // Fetch all products from JSONBin
        const jsonbinData = await fetchData();
        
        // Determine which collection to use
        let collection = isRoom ? jsonbinData.rooms : jsonbinData.products;
        
        if (!collection || !Array.isArray(collection)) {
          console.error(`Collection not found or not an array: ${isRoom ? 'rooms' : 'products'}`);
          return;
        }
        
        // Filter similar items
        let similarItems = collection.filter(item => {
          // Don't include the current item
          if (item.title === data.title) return false;
          
          // For rooms, match by roomType
          if (isRoom && item.roomType) {
            return item.roomType === data.roomType;
          }
          
          // For products, match by category
          return item.category === category;
        });
        
        // Limit to 4 items
        similarItems = similarItems.slice(0, 4);
        
        // If we don't have enough similar items, try to fetch from MongoDB
        if (similarItems.length < 4) {
          try {
            // Fetch additional items from MongoDB
            const endpoint = isRoom ? '/api/rooms' : '/api/products';
            const response = await fetch(endpoint);
            
            if (response.ok) {
              const items = await response.json();
              
              // Filter and add items not already in similarItems
              const existingTitles = similarItems.map(item => item.title);
              
              const additionalItems = items.filter(item => {
                if (existingTitles.includes(item.title) || item.title === data.title) return false;
                
                if (isRoom && item.roomType) {
                  return item.roomType === data.roomType;
                }
                
                return item.category === category;
              });
              
              // Add additional items to fill up to 4
              const neededCount = 4 - similarItems.length;
              if (neededCount > 0 && additionalItems.length > 0) {
                similarItems = [...similarItems, ...additionalItems.slice(0, neededCount)];
              }
            }
          } catch (error) {
            console.error("Error fetching additional items from MongoDB:", error);
          }
        }
        
        // Render similar items
        if (similarItems.length === 0) {
          similarContainer.innerHTML = '<p>No similar items found.</p>';
          return;
        }
        
        let html = '<div class="similar-items-grid">';
        
        similarItems.forEach(item => {
          const image = item.images && item.images.length > 0 ? 
            item.images[0] : 'https://via.placeholder.com/150';
          
          html += `
            <div class="similar-item">
              <a href="product_interface.html?product=${encodeURIComponent(item.title)}">
                <div class="similar-item-image">
                  <img src="${image}" alt="${item.title}">
                </div>
                <div class="similar-item-details">
                  <h3>${item.title}</h3>
                  <p class="similar-item-price">₹${item.price}</p>
                  <p class="similar-item-location">${item.location || 'Location not specified'}</p>
                </div>
              </a>
            </div>
          `;
        });
        
        html += '</div>';
        similarContainer.innerHTML = html;
      } catch (error) {
        console.error("Error loading similar products:", error);
        document.getElementById('similarProducts').innerHTML = '<p>Failed to load similar items.</p>';
      }
    }

    // Show seller information
    function showSellerInfo() {
      if (!currentProduct) return;
      
      const modal = document.getElementById('sellerInfoModal');
      const content = document.getElementById('sellerInfoContent');
      
      if (!modal || !content) return;
      
      // Get seller information
      const sellerName = currentProduct.sellerName || 'Anonymous';
      const sellerEmail = currentProduct.sellerEmail || 'Not provided';
      const sellerPhone = currentProduct.sellerPhone || 'Not provided';
      
      // Build content
      content.innerHTML = `
        <h2>Seller Information</h2>
        <ul>
          <li><strong>Name:</strong> ${sellerName}</li>
          <li><strong>Email:</strong> ${sellerEmail}</li>
          <li><strong>Phone:</strong> ${sellerPhone}</li>
        </ul>
        <div class="chat-container">
          <h3>Send a Message</h3>
          <div class="chat-box" id="chatBox">
            <div class="chat-message system-message">
              Start a conversation with the seller.
            </div>
          </div>
          <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
          </div>
        </div>
      `;
      
      // Show modal
      modal.style.display = 'flex';
      
      // Add close functionality
      const closeBtn = modal.querySelector('.modal-close');
      if (closeBtn) {
        closeBtn.onclick = () => {
          modal.style.display = 'none';
        };
      }
      
      // Close when clicking outside
      window.onclick = (event) => {
        if (event.target === modal) {
          modal.style.display = 'none';
        }
      };
    }

    // Send message function (placeholder)
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const chatBox = document.getElementById('chatBox');
      
      if (!input || !chatBox || !input.value.trim()) return;
      
      // Add user message
      const userMessage = document.createElement('div');
      userMessage.className = 'chat-message user-message';
      userMessage.textContent = input.value;
      chatBox.appendChild(userMessage);
      
      // Clear input
      const message = input.value;
      input.value = '';
      
      // Simulate response (in a real app, this would send to a server)
      setTimeout(() => {
        const sellerMessage = document.createElement('div');
        sellerMessage.className = 'chat-message seller-message';
        sellerMessage.textContent = `Thank you for your interest in "${currentProduct.title}". I'll get back to you soon.`;
        chatBox.appendChild(sellerMessage);
        
        // Scroll to bottom
        chatBox.scrollTop = chatBox.scrollHeight;
      }, 1000);
      
      // Scroll to bottom
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
