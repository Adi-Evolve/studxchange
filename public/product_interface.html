<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Interface - StudXchange</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" />
  <script src="js/db-config.js"></script>
  <style>
    :root {
      --primary-color: #2a3d56;
      --secondary-color: #2a3d56;
      --accent-color: #1a75ff;
      --text-color: #333;
      --bg-color: #f4f6f9;
      --white-color: #fff;
      --shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: var(--primary-color);
      color: var(--white-color);
      padding: 1rem;
      text-align: center;
      box-shadow: var(--shadow);
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .product-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      background: var(--white-color);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    .product-images {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .main-image-container {
      width: 100%;
      height: 400px;
      border-radius: 12px;
      overflow: hidden;
      background-color: #eaeaea;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnails {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding: 0.5rem 0;
    }

    .thumbnail {
      flex: 0 0 auto;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .thumbnail:hover {
      transform: scale(1.05);
      opacity: 0.8;
    }

    .product-details {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .product-header {
      border-bottom: 1px solid #ddd;
      padding-bottom: 1rem;
    }

    .product-title {
      font-size: 2rem;
      color: var(--secondary-color);
      margin-bottom: 0.5rem;
    }

    .price-section {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .current-price {
      font-size: 1.75rem;
      color: var(--accent-color);
      font-weight: bold;
    }

    .original-price {
      color: #777;
      text-decoration: line-through;
      font-size: 1rem;
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      margin: 1rem 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background-color: var(--accent-color);
      color: var(--white-color);
    }

    .btn-secondary {
      background-color: var(--secondary-color);
      color: var(--white-color);
    }

    .btn:hover {
      transform: scale(1.02);
    }

    .product-description {
      margin: 2rem 0;
      line-height: 1.6;
    }

    .product-description p {
      line-height: 1.6;
      font-size: 1rem;
    }

    footer {
      background-color: var(--primary-color);
      color: var(--white-color);
      text-align: center;
      padding: 1.5rem;
      margin-top: auto;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--white-color);
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      position: relative;
      box-shadow: var(--shadow);
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      cursor: pointer;
      font-size: 1.5rem;
    }

    .buyer-info {
      display: grid;
      gap: 1rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      .product-container {
        grid-template-columns: 1fr;
      }
      .main-image-container {
        height: 300px;
      }
      
      .room-layout {
        display: flex;
        flex-direction: column;
      }
      
      .room-images {
        order: 1;
      }
      
      .room-info {
        order: 2;
      }
      
      .room-description {
        order: 3;
      }
    }

    /* Seller Info Styles */
    #sellerInfoContent ul {
      list-style: none;
      padding: 0;
    }

    #sellerInfoContent li {
      margin: 0.5rem 0;
      padding: 0.5rem;

  <main>

          </div>

        <div class="product-header room-info">
          <div style="display: flex; justify-content: space-between; align-items: center">

            <div class="rating-input" style="margin-bottom: 1rem;">
              <span>Rating: </span>
              <div class="star-rating-selector" id="ratingStars">

                <i class="far fa-star" data-rating="2"></i>
                <i class="far fa-star" data-rating="3"></i>
                <i class="far fa-star" data-rating="4"></i>
                <i class="far fa-star" data-rating="5"></i>
              </div>
              <input type="hidden" id="ratingInput" value="5">
            </div>
            <textarea id="reviewText" placeholder="Write your review..." style="width: 100%; min-height: 100px; margin-bottom: 1rem;"></textarea>
            <button class="btn btn-primary" onclick="submitReview()">Submit Review</button>
          </div>
        </div>
      </div>
    </div>

          <div class="input-group">

          <div class="input-group">

  function updateWishlistIcon() {
  const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
  const wishlistIcon = document.querySelector('.wishlist-toggle');
  
  // Always start with far (outline)
  wishlistIcon.classList.add('far');
  wishlistIcon.classList.remove('fas');

  if (wishlist.some(item => item.title === currentProduct.title)) {
    wishlistIcon.classList.add('fas');
    wishlistIcon.classList.remove('far');
  }
}

async function toggleWishlist(product) {
  let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
  const index = wishlist.findIndex(item => item.title === product.title);
  
  if (index === -1) {
    wishlist.push({
      title: product.title,
      price: product.price,
      image: product.images?.[0] || product.image,
      category: product.category
    });
  } else {
    wishlist.splice(index, 1);
  }
  
  localStorage.setItem('wishlist', JSON.stringify(wishlist));
  updateWishlistIcon();
}

    async function fetchData() {
      try {
        console.log("Fetching data from JSONBin...");
        const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
          headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        const data = await response.json();
        console.log("Raw data from JSONBin:", data);
        if (!data.record) {
          console.error("No record found in JSONBin response");
        } else {
          console.log("Products count:", data.record.products?.length || 0);
          console.log("Rooms count:", data.record.rooms?.length || 0);
          // Log first item of each collection to verify structure
          if (data.record.products?.length > 0) {
            console.log("Sample product:", data.record.products[0]);
          }
          if (data.record.rooms?.length > 0) {
            console.log("Sample room:", data.record.rooms[0]);
          } else {
            console.warn("The 'rooms' collection exists but is empty or not found in the response");
          }
        }
        return data.record || { products: [], users: [], soldItems: [], rooms: [] };
      } catch (error) {
        console.error("Failed to load data:", error);
        return { products: [], users: [], soldItems: [], rooms: [] };
      }
    }

    async function loadProductDetails() {
      const urlParams = new URLSearchParams(window.location.search);
      const rawParam = urlParams.get('product');
      
      if (!rawParam) {
        console.error("No product parameter provided in URL");
        displayError("No product specified. Please select a product from the home page.");
        return;
      }
      
      // Try different decoding methods to handle potential double encoding
      const productTitleParam = decodeURIComponent(rawParam);
      const doubleDecodedParam = decodeURIComponent(productTitleParam);
      
      console.log("Loading product/room with:");
      console.log("- Raw param:", rawParam);
      console.log("- Decoded once:", productTitleParam);
      console.log("- Decoded twice:", doubleDecodedParam);

      try {
        // Show loading indicator
        document.getElementById('loading').style.display = 'flex';
        
        // Fetch all data from JSONBin
        const data = await fetchData();
        console.log("Loaded data structure:", Object.keys(data));
        
        // First check in products collection
        let item = null;
        const titleVariations = [
          productTitleParam,
          doubleDecodedParam,
          encodeURIComponent(productTitleParam)
        ];
        
        if (data.products && Array.isArray(data.products)) {
          console.log("Searching in products collection...");
          // Try all title variations
          for (const title of titleVariations) {
            item = data.products.find(p => p.title === title);
            if (item) {
              console.log("Found in products collection with variation:", title);
              break;
            }
          }
          
          // If not found with exact match, try case-insensitive match
          if (!item) {
            console.log("Trying case-insensitive match for products...");
            for (const title of titleVariations) {
              item = data.products.find(p => 
                p.title && p.title.toLowerCase() === title.toLowerCase()
              );
              if (item) {
                console.log("Found product with case-insensitive match:", item);
                break;
              }
            }
          }
        } else {
          console.error("Products collection missing or not an array");
        }
        
        // If not found in products, check in rooms collection
        if (!item && data.rooms) {
          if (Array.isArray(data.rooms)) {
            console.log("Searching in rooms collection...");
            console.log("Number of rooms in data:", data.rooms.length);
            // Log all room titles to debug matching issues
            console.log("Available room titles:", data.rooms.map(r => r.title));
            
            // Try all title variations
            for (const title of titleVariations) {
              item = data.rooms.find(r => r.title === title);
              if (item) {
                console.log("Found in rooms collection with variation:", title);
                item.category = 'Room';
                break;
              }
            }
            
            if (!item) {
              // Try case-insensitive search as fallback
              console.log("Trying case-insensitive match...");
              for (const title of titleVariations) {
                item = data.rooms.find(r => 
                  r.title && r.title.toLowerCase() === title.toLowerCase()
                );
                if (item) {
                  console.log("Found with case-insensitive match:", item);
                  item.category = 'Room';
                  break;
                }
              }
            }
          } else {
            console.error("Rooms collection is not an array:", data.rooms);
          }
        } else {
          console.warn("No 'rooms' array found in the data. Key properties:", Object.keys(data));
        }
        
        // Try fetching directly from MongoDB via API if not found
        if (!item) {
          console.log("Item not found in JSONBin data, trying direct MongoDB access...");
          // Try each variation
          for (const title of titleVariations) {
            try {
              // Try to fetch room data
              const roomResponse = await fetch(`/api/rooms/title/${encodeURIComponent(title)}`);
              if (roomResponse.ok) {
                const roomData = await roomResponse.json();
                if (roomData) {
                  item = roomData;
                  item.category = 'Room';
                  console.log("Successfully retrieved room directly from MongoDB:", item);
                  break;
                }
              }
              
              // Try to fetch product data
              const productResponse = await fetch(`/api/products/title/${encodeURIComponent(title)}`);
              if (productResponse.ok) {
                const productData = await productResponse.json();
                if (productData) {
                  item = productData;
                  console.log("Successfully retrieved product directly from MongoDB:", item);
                  break;
                }
              }
            } catch (apiError) {
              console.error("Error fetching from API:", apiError);
            }
          }
        }
        
        currentProduct = item;

        if (!currentProduct) {
          console.error("Item not found in products or rooms. Title variations tried:", titleVariations);
          
          // Try direct debugging of the entire data object
          console.log("Full data object for debugging:", JSON.stringify(data));
          
          // Last resort: Create a temporary room object for testing
          if (confirm('Product not found in database. Would you like to view a temporary room for testing?')) {
            currentProduct = {
              title: productTitleParam,
              price: "5000",
              description: "This is a temporary room for testing. The actual room could not be found in the database.",
              hostelName: "Test Hostel",
              college: "Test College",
              sellerEmail: "test@example.com",
              sellerPhone: "1234567890",
              category: "Room",
              images: ["https://via.placeholder.com/400x300?text=Room+Image"]
            };
            console.log("Created temporary room for testing:", currentProduct);
          } else {
            displayError("Product not found. It may have been removed or sold.");
            return;
          }
        }
        
        console.log("Found item:", currentProduct);
        renderProductDetails();
      } catch (error) {
        console.error("Error loading product details:", error);
        displayError("Failed to load product details. Please try again later.");
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    // Function to load similar products
    async function loadSimilarProducts(data) {
      try {
        const similarProductsSection = document.getElementById('similarProductsSection');
        const similarProductsList = document.getElementById('similarProductsList');
        
        // Clear previous content
        similarProductsList.innerHTML = '';
        
        if (!currentProduct) {
          similarProductsSection.style.display = 'none';
          return;
        }
        
        // Determine what to match on
        const isRoom = currentProduct.category === 'Room';
        const matchCollege = currentProduct.college;
        
        // Find similar products
        let similarItems = [];
        
        if (isRoom) {
          // For rooms, find other rooms in the same college
          similarItems = data.rooms?.filter(room => 
            room.college === matchCollege && 
            room.title !== currentProduct.title
          ) || [];
          
          // If not enough similar rooms, add some from other colleges
          if (similarItems.length < 3 && data.rooms) {
            const otherRooms = data.rooms.filter(room => 
              room.college !== matchCollege && 
              room.title !== currentProduct.title
            );
            
            // Add enough to make at least 3 if possible
            const neededCount = Math.min(3 - similarItems.length, otherRooms.length);
            similarItems = [...similarItems, ...otherRooms.slice(0, neededCount)];
          }
          
          // Add category to each item
          similarItems.forEach(item => item.category = 'Room');
        } else {
          // For products, find other products in the same college
          similarItems = data.products?.filter(product => 
            product.college === matchCollege && 
            product.title !== currentProduct.title
          ) || [];
          
          // If not enough similar products, add some from other colleges
          if (similarItems.length < 3 && data.products) {
            const otherProducts = data.products.filter(product => 
              product.college !== matchCollege && 
              product.title !== currentProduct.title
            );
            
            // Add enough to make at least 3 if possible
            const neededCount = Math.min(3 - similarItems.length, otherProducts.length);
            similarItems = [...similarItems, ...otherProducts.slice(0, neededCount)];
          }
        }
        
        // Limit to 4 similar items
        similarItems = similarItems.slice(0, 4);
        
        // If no similar items found, hide the section
        if (similarItems.length === 0) {
          similarProductsSection.style.display = 'none';
          return;
        }
        
        // Show the section
        similarProductsSection.style.display = 'block';
        
        // Create cards for each similar item
        similarItems.forEach(item => {
          const card = document.createElement('div');
          card.className = 'similar-product-card';
          
          // Get image
          const itemImage = item.images?.[0] || item.image || 'placeholder.jpg';
          
          // Create card content
          card.innerHTML = `
            <img src="${itemImage}" alt="${item.title}" class="similar-product-img">
            <div class="similar-product-info">
              <div class="similar-product-title">${item.title}</div>
              <div class="similar-product-price">₹${item.price} ${item.category === 'Room' ? '/month' : ''}</div>
              <div class="similar-product-college">${item.college || 'College not specified'}</div>
            </div>
          `;
          
          // Add click event to navigate to the product
          card.addEventListener('click', () => {
            window.location.href = `product_interface.html?product=${encodeURIComponent(item.title)}`;
          });
          
          similarProductsList.appendChild(card);
        });
        
      } catch (error) {
        console.error('Error loading similar products:', error);
        document.getElementById('similarProductsSection').style.display = 'none';
      }
    }
